name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore FreeAgent.slnx

      - name: Build SDK (net8.0)
        run: dotnet build src/FreeAgent.Client/FreeAgent.Client.csproj --no-restore --configuration Release -f net8.0

      - name: Build SDK (net10.0)
        run: dotnet build src/FreeAgent.Client/FreeAgent.Client.csproj --no-restore --configuration Release -f net10.0

      - name: Build Sample
        run: dotnet build samples/FreeAgent.Client.Sample/FreeAgent.Client.Sample.csproj --no-restore --configuration Release

      - name: Test (net8.0)
        run: dotnet test tests/FreeAgent.Client.Tests/FreeAgent.Client.Tests.csproj --configuration Release -f net8.0 --logger "trx;LogFileName=results-net8.trx"

      - name: Test (net10.0)
        run: dotnet test tests/FreeAgent.Client.Tests/FreeAgent.Client.Tests.csproj --configuration Release -f net10.0 --logger "trx;LogFileName=results-net10.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: "**/results-*.trx"
