name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore FreeAgent.slnx

      - name: Build
        run: dotnet build FreeAgent.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test FreeAgent.slnx --no-build --configuration Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/results.trx"
