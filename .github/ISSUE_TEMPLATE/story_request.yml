name: Story request
description: Propose a feature or improvement as a story
labels: [story]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the work as a story so it can be triaged and planned consistently.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Use the format - As a [user], I can [action], so that [benefit]
      placeholder: As a ..., I can ..., so that ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List clear, testable outcomes
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: textarea
    id: related
    attributes:
      label: Related context
      description: Related issue/PR links, repo context, or constraints
