name: Feature request
description: Propose a new capability or enhancement for the SDK
title: "feat: "
labels: [story]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for user-facing features or meaningful enhancements.
        Keep scope tight and link each request to project goals where possible.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the feature and expected user/developer value
      placeholder: Add a concise summary of the requested feature.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this solve, and for whom?
      placeholder: Describe the pain point this feature addresses.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Define what is in scope and out of scope for this issue
      placeholder: |
        In scope:
        - ...

        Out of scope:
        - ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List clear, testable outcomes
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks and trade-offs
      description: Note implementation risks, compatibility concerns, or trade-offs
      placeholder: |
        - Risk:
        - Mitigation:
    validations:
      required: true
  - type: textarea
    id: goals
    attributes:
      label: Goal links
      description: Link relevant goals from GOALS.md (for example G1, G2)
      placeholder: |
        - G2 (...)
        - G5 (...)
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links to prior issues/PRs, API docs, or implementation notes
